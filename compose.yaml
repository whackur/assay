name: assay

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: 3000
    init: true
    ports:
      - "${ASSAY_WEB_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/').then((response) =>
          process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
