name: assay-prod

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assay}
      POSTGRES_USER: ${POSTGRES_USER:-assay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the NAS-local environment file}
    restart: unless-stopped
    volumes:
      - assay-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assay} -d ${POSTGRES_DB:-assay}"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 24

  api:
    image: ${ASSAY_API_IMAGE:?set an immutable assay-api digest reference}
    environment:
      ASSAY_API_BIND: 0.0.0.0:8080
      ASSAY_INTERNAL_ADMIN_TOKEN: ${ASSAY_INTERNAL_ADMIN_TOKEN:?set ASSAY_INTERNAL_ADMIN_TOKEN in the NAS-local environment file}
      ASSAY_MAX_ACTIVE_JOBS: ${ASSAY_MAX_ACTIVE_JOBS:-8}
      ASSAY_PUBLIC_COMPLETED_COOLDOWN_SECONDS: ${ASSAY_PUBLIC_COMPLETED_COOLDOWN_SECONDS:-1209600}
      ASSAY_PUBLIC_FAILURE_BACKOFF_SECONDS: ${ASSAY_PUBLIC_FAILURE_BACKOFF_SECONDS:-60}
      ASSAY_PUBLIC_BUCKET_WINDOW_SECONDS: ${ASSAY_PUBLIC_BUCKET_WINDOW_SECONDS:-600}
      ASSAY_PUBLIC_BUCKET_COOLDOWN_SECONDS: ${ASSAY_PUBLIC_BUCKET_COOLDOWN_SECONDS:-900}
      ASSAY_PUBLIC_ANONYMOUS_BURST: ${ASSAY_PUBLIC_ANONYMOUS_BURST:-4}
      ASSAY_PUBLIC_OWNER_BURST: ${ASSAY_PUBLIC_OWNER_BURST:-3}
      ASSAY_PUBLIC_PROVIDER_BURST: ${ASSAY_PUBLIC_PROVIDER_BURST:-20}
      ASSAY_SEED_REPOSITORIES: ${ASSAY_SEED_REPOSITORIES:-whackur/assay}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the NAS-local environment file}
    depends_on:
      db:
        condition: service_healthy
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 18

  worker:
    image: ${ASSAY_WORKER_IMAGE:?set an immutable assay-worker digest reference}
    environment:
      ASSAY_GITHUB_TOKEN: ${ASSAY_GITHUB_TOKEN:-}
      ASSAY_OLLAMA_API_KEY: ${ASSAY_OLLAMA_API_KEY:-}
      ASSAY_OLLAMA_BASE_URL: ${ASSAY_OLLAMA_BASE_URL:-}
      ASSAY_OLLAMA_MODEL: ${ASSAY_OLLAMA_MODEL:-}
      ASSAY_PROVIDER_RETRY_MAX_SECONDS: ${ASSAY_PROVIDER_RETRY_MAX_SECONDS:-3600}
      ASSAY_PUBLIC_FAILURE_CIRCUIT_THRESHOLD: ${ASSAY_PUBLIC_FAILURE_CIRCUIT_THRESHOLD:-3}
      ASSAY_PUBLIC_FAILURE_CIRCUIT_COOLDOWN_SECONDS: ${ASSAY_PUBLIC_FAILURE_CIRCUIT_COOLDOWN_SECONDS:-900}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the NAS-local environment file}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    init: true
    restart: unless-stopped

  web:
    image: ${ASSAY_WEB_IMAGE:?set an immutable assay-web digest reference}
    environment:
      ASSAY_API_INTERNAL_URL: http://api:8080
      ASSAY_INTERNAL_ADMIN_TOKEN: ${ASSAY_INTERNAL_ADMIN_TOKEN:?set ASSAY_INTERNAL_ADMIN_TOKEN in the NAS-local environment file}
      ASSAY_TRUSTED_CLIENT_IP_HEADER: ${ASSAY_TRUSTED_CLIENT_IP_HEADER:-}
      ASSAY_ADMISSION_HASH_KEY: ${ASSAY_ADMISSION_HASH_KEY:-}
      ASSAY_DATA_DIR: /app/data
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    init: true
    ports:
      - "127.0.0.1:${ASSAY_WEB_PORT:-1019}:3000"
    restart: unless-stopped
    volumes:
      - assay-web-data:/app/data

volumes:
  assay-postgres-data:
    external: true
    name: ${ASSAY_POSTGRES_VOLUME:?set an explicit stable ASSAY_POSTGRES_VOLUME}
  assay-web-data:
    external: true
    name: ${ASSAY_WEB_VOLUME:?set an explicit stable ASSAY_WEB_VOLUME}
