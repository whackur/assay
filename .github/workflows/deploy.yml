name: Deploy Assay Preview to Synology NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: assay-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/whackur/assay-web

jobs:
  verify:
    name: Verify the web dashboard before publishing
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out the repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          # Matches the node:22 base image in the Dockerfile.
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint without warnings
        run: npm run lint

      - name: Run web tests
        run: npm test

      - name: Build the production bundle
        run: npm run build

  build:
    name: Build and publish preview image
    needs: verify
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Check out the repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and publish immutable and latest tags
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          docker_config="$(mktemp -d)"
          export DOCKER_CONFIG="$docker_config"

          cleanup() {
            docker logout ghcr.io >/dev/null 2>&1 || true
            rm -rf "$docker_config"
          }
          trap cleanup EXIT

          printf '%s' "$GHCR_TOKEN" |
            docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin >/dev/null
          unset GHCR_TOKEN

          docker buildx build \
            --file Dockerfile \
            --target web-runtime \
            --tag "${IMAGE_REPOSITORY}:latest" \
            --tag "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --push \
            .

  deploy:
    name: Deploy preview to Synology NAS
    needs: build
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Deploy the immutable image
        # appleboy/ssh-action v1.2.4
        uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0
        env:
          ASSAY_DEPLOY_IMAGE: ghcr.io/whackur/assay-web:${{ github.sha }}
          ASSAY_GHCR_TOKEN: ${{ github.token }}
          ASSAY_GHCR_USER: ${{ github.actor }}
          ASSAY_GIT_SHA: ${{ github.sha }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          port: ${{ secrets.REMOTE_PORT }}
          key: ${{ secrets.REMOTE_KEY }}
          fingerprint: ${{ secrets.REMOTE_FINGERPRINT }}
          command_timeout: 15m
          debug: false
          envs: ASSAY_DEPLOY_IMAGE,ASSAY_GHCR_TOKEN,ASSAY_GHCR_USER,ASSAY_GIT_SHA,TARGET_DIR
          script: |
            set -eu
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"

            readonly repository_url="https://github.com/whackur/assay.git"
            readonly smoke_url="http://127.0.0.1:3001/"

            if [ ! -d "$TARGET_DIR" ]; then
              echo "TARGET_DIR must already exist on the NAS." >&2
              exit 1
            fi

            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "TARGET_DIR must contain the public Assay Git checkout." >&2
              exit 1
            fi

            cd "$TARGET_DIR"

            docker_config="$(mktemp -d)"

            cleanup() {
              sudo -n env DOCKER_CONFIG="$docker_config" docker logout ghcr.io \
                >/dev/null 2>&1 || true
              sudo -n rm -rf -- "$docker_config" || true
            }
            trap cleanup EXIT

            nas_docker() {
              sudo -n env DOCKER_CONFIG="$docker_config" docker "$@"
            }

            nas_compose() {
              sudo -n env \
                COMPOSE_DISABLE_ENV_FILE=1 \
                DOCKER_CONFIG="$docker_config" \
                ASSAY_IMAGE="$ASSAY_IMAGE" \
                ASSAY_WEB_PORT="$ASSAY_WEB_PORT" \
                docker compose -f compose.yaml "$@"
            }

            previous_container="$(
              nas_docker ps \
                --filter label=com.docker.compose.project=assay-prod \
                --filter label=com.docker.compose.service=web \
                --format '{{.ID}}' | head -n 1
            )"
            previous_image=""
            if [ -n "$previous_container" ]; then
              previous_image="$(nas_docker inspect --format '{{.Config.Image}}' "$previous_container")"
              echo "Captured the previously running image for rollback."
            fi

            git remote set-url origin "$repository_url"
            git fetch --prune origin main
            git cat-file -e "${ASSAY_GIT_SHA}^{commit}"
            git merge-base --is-ancestor "$ASSAY_GIT_SHA" origin/main
            git reset --hard "$ASSAY_GIT_SHA"

            printf '%s' "$ASSAY_GHCR_TOKEN" |
              nas_docker login ghcr.io \
                --username "$ASSAY_GHCR_USER" \
                --password-stdin >/dev/null
            unset ASSAY_GHCR_TOKEN

            wait_for_health() {
              attempt=1

              while [ "$attempt" -le 30 ]; do
                container_id="$(nas_compose ps -q web)"
                if [ -n "$container_id" ]; then
                  health_status="$(
                    nas_docker inspect \
                      --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' \
                      "$container_id" 2>/dev/null || true
                  )"
                  echo "Health check ${attempt}/30: ${health_status:-missing}"

                  case "$health_status" in
                    healthy)
                      nas_compose ps web
                      return 0
                      ;;
                    unhealthy)
                      nas_compose ps web
                      return 1
                      ;;
                  esac
                fi

                sleep 2
                attempt=$((attempt + 1))
              done

              nas_compose ps web
              return 1
            }

            deploy_image() {
              ASSAY_IMAGE="$1"
              ASSAY_WEB_PORT=3001

              nas_compose pull web || return 1
              nas_compose up -d --no-build --force-recreate --remove-orphans web || return 1
              wait_for_health || return 1
              curl --fail --silent --show-error --max-time 10 "$smoke_url" >/dev/null || return 1
            }

            if deploy_image "$ASSAY_DEPLOY_IMAGE"; then
              echo "Assay preview deployment passed health and smoke checks."
              exit 0
            fi

            echo "Assay preview deployment failed." >&2
            if [ -z "$previous_image" ]; then
              echo "No previously running image is available for rollback." >&2
              exit 1
            fi

            echo "Attempting one rollback to the previously running image." >&2
            if deploy_image "$previous_image"; then
              echo "Rollback restored the previous image." >&2
            else
              echo "Rollback attempt also failed." >&2
            fi

            exit 1
