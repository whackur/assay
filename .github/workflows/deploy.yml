name: Publish Assay Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: assay-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/whackur/assay-web

jobs:
  verify:
    name: Verify the web dashboard before publishing
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out the repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          # Matches the node:22 base image in the Dockerfile.
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint without warnings
        run: npm run lint

      - name: Run web tests
        run: npm test

      - name: Build the production bundle
        run: npm run build

  build:
    name: Build and publish preview image
    needs: verify
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Check out the repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and publish immutable and latest tags
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          docker_config="$(mktemp -d)"
          export DOCKER_CONFIG="$docker_config"

          cleanup() {
            docker logout ghcr.io >/dev/null 2>&1 || true
            rm -rf "$docker_config"
          }
          trap cleanup EXIT

          printf '%s' "$GHCR_TOKEN" |
            docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin >/dev/null
          unset GHCR_TOKEN

          docker buildx build \
            --file Dockerfile \
            --target web-runtime \
            --tag "${IMAGE_REPOSITORY}:latest" \
            --tag "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --push \
            .
